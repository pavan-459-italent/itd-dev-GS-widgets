<style>
.html-widget-section {
  padding: 16px;
  font-family: "Inter", system-ui, -apple-system, sans-serif;
  border-radius: 12px;
  background: #DCF3FA;
  box-shadow: inset 5px 0 0 0 #4FC1E8, 0 1px 3px rgba(0,0,0,0.10), 0 1px 2px rgba(0,0,0,0.06);
  color: #1e1e2e;
  box-sizing: border-box;
  max-width: 480px;
  margin: 24px 0 24px 24px;
}

.widget-header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin: 0 0 10px 0;
}

.widget-framework-header {
  margin: 0;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: #444458;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.refresh-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  width: 24px;
  height: 24px;
  padding: 0;
  font-size: 0.875rem;
  line-height: 1;
  color: #1e1e2e;
  background: #ffffff;
  border: 1px solid rgba(0, 0, 0, 0.12);
  border-radius: 6px;
  cursor: pointer;
}

.refresh-btn:hover:not(:disabled) {
  background: #4FC1E8;
  color: #ffffff;
}

.refresh-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.refresh-btn.is-spinning {
  animation: refresh-spin 0.6s linear infinite;
}

@keyframes refresh-spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.post-list {
  list-style: none;
  margin: 0;
  padding: 0;
}

.post-item {
  padding: 9px 0;
}

.post-item + .post-item {
  border-top: 1px solid rgba(0, 0, 0, 0.07);
}

.post-title {
  font-size: 0.8125rem;
  font-weight: 600;
  color: #1e1e2e;
  margin: 0 0 3px 0;
  line-height: 1.3;
  text-transform: capitalize;
}

.post-body {
  font-size: 0.6875rem;
  color: #5a5a72;
  line-height: 1.4;
  margin: 0;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.post-status {
  font-size: 0.75rem;
  color: #5a5a72;
  padding: 12px 0;
}

.post-pager {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid rgba(0, 0, 0, 0.07);
}

.post-pager-label {
  font-size: 0.6875rem;
  color: #444458;
  white-space: nowrap;
}

.post-pager-btn {
  font-family: inherit;
  font-size: 0.6875rem;
  font-weight: 600;
  color: #1e1e2e;
  background: #ffffff;
  border: 1px solid rgba(0, 0, 0, 0.12);
  border-radius: 6px;
  padding: 5px 12px;
  cursor: pointer;
}

.post-pager-btn:hover:not(:disabled) {
  background: #4FC1E8;
  color: #ffffff;
}

.post-pager-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
</style>
<section class="html-widget-section">
  <div class="widget-header-row">
    <p class="widget-framework-header">JSON placeholder api results</p>
    <button type="button" class="refresh-btn" id="refresh-btn" title="Refresh" aria-label="Refresh posts">&#8635;</button>
  </div>
  <div id="post-content">
    <p class="post-status">Loading posts&hellip;</p>
  </div>
</section>
<script type="module">
  const POST_LIMIT = 50;
  const PAGE_SIZE = 5;

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;",
    }[c]));
  }

  export async function init(sdk) {
    await sdk.whenReady();

    const connectorsSdk = typeof window.WidgetServiceSDK === "function" ? new window.WidgetServiceSDK() : null;

    const contentEl = sdk.root.querySelector("#post-content");
    const refreshBtn = sdk.root.querySelector("#refresh-btn");

    function renderPage(posts, page) {
      const totalPages = Math.max(1, Math.ceil(posts.length / PAGE_SIZE));
      const start = (page - 1) * PAGE_SIZE;
      const pagePosts = posts.slice(start, start + PAGE_SIZE);

      const items = pagePosts
        .map(
          (post) => `
            <li class="post-item">
              <p class="post-title">${escapeHtml(post.title)}</p>
              <p class="post-body">${escapeHtml(post.body)}</p>
            </li>`
        )
        .join("");

      contentEl.innerHTML = `
        <ul class="post-list" aria-label="Posts">${items}</ul>
        <div class="post-pager">
          <button class="post-pager-btn" id="prev-btn" ${page <= 1 ? "disabled" : ""}>Prev</button>
          <span class="post-pager-label">Page ${page} of ${totalPages}</span>
          <button class="post-pager-btn" id="next-btn" ${page >= totalPages ? "disabled" : ""}>Next</button>
        </div>
      `;

      sdk.root.querySelector("#prev-btn").addEventListener("click", () => {
        if (page > 1) renderPage(posts, page - 1);
      });
      sdk.root.querySelector("#next-btn").addEventListener("click", () => {
        if (page < totalPages) renderPage(posts, page + 1);
      });
    }

    function loadPosts() {
      if (!connectorsSdk || !connectorsSdk.connectors || typeof connectorsSdk.connectors.execute !== "function") {
        contentEl.innerHTML = `<p class="post-status">Connector SDK unavailable.</p>`;
        return;
      }

      refreshBtn.disabled = true;
      refreshBtn.classList.add("is-spinning");
      contentEl.innerHTML = `<p class="post-status">Loading posts&hellip;</p>`;

      connectorsSdk.connectors
        .execute({
          permalink: "json-placeholder-get-posts",
          method: "GET",
        })
        .then((result) => {
          const posts = (Array.isArray(result) ? result : result?.data ?? []).slice(0, POST_LIMIT);

          if (!posts.length) {
            contentEl.innerHTML = `<p class="post-status">No posts found.</p>`;
            return;
          }

          renderPage(posts, 1);
        })
        .catch((err) => {
          contentEl.innerHTML = `<p class="post-status">Failed to load posts: ${escapeHtml(err && err.message ? err.message : "Unknown error")}</p>`;
        })
        .finally(() => {
          refreshBtn.disabled = false;
          refreshBtn.classList.remove("is-spinning");
        });
    }

    refreshBtn.addEventListener("click", loadPosts);

    loadPosts();
  }
</script>
